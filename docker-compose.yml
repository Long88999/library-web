version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: library_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: library_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - library_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: library_backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/library_db?authSource=admin
      NODE_ENV: production
      APP_NAME: Library Web Application
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - library_network
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: on-failure

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: library_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - library_network
    restart: on-failure

volumes:
  mongodb_data:
  mongodb_config:

networks:
  library_network:
    driver: bridge
